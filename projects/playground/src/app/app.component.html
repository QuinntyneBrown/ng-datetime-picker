<div class="container">
  <h1>DateTime Picker Demo</h1>

  <qb-datetime-picker
    [value]="selectedDate"
    (valueChange)="onDateTimeChange($event)"
  ></qb-datetime-picker>

  <p class="output">
    Selected: <strong>{{ selectedDate ?? 'None' }}</strong>
  </p>

  <h2>Compact Variant</h2>

  <qb-datetime-picker
    [value]="compactDate"
    [compact]="true"
    (valueChange)="onCompactDateTimeChange($event)"
  ></qb-datetime-picker>

  <p class="compact-output">
    Selected: <strong>{{ compactDate ?? 'None' }}</strong>
  </p>
</div>
