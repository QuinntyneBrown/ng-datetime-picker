<div class="qb-datetime-picker" [ngClass]="{'qb-datetime-picker--compact': compact}">
  <mat-form-field appearance="outline">
    <mat-label>Date</mat-label>
    <input matInput [matDatepicker]="picker" [ngModel]="date" (dateChange)="onDateChange($event)" />
    <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
    <mat-datepicker #picker></mat-datepicker>
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Hour</mat-label>
    <input matInput type="number" [ngModel]="hour" (ngModelChange)="onHourChange($event)" min="0" max="23" />
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Minute</mat-label>
    <input matInput type="number" [ngModel]="minute" (ngModelChange)="onMinuteChange($event)" min="0" max="59" />
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Second</mat-label>
    <input matInput type="number" [ngModel]="second" (ngModelChange)="onSecondChange($event)" min="0" max="59" />
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Millisecond</mat-label>
    <input matInput type="number" [ngModel]="millisecond" (ngModelChange)="onMillisecondChange($event)" min="0" max="999" />
  </mat-form-field>
</div>
